name: SEO quality gate

on:
  pull_request:
  workflow_dispatch:

jobs:
  seo-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Audit public content for Bolsa Mais
        env:
          NEXT_PUBLIC_THEME: bolsamais
          NEXT_PUBLIC_SEO_INDEXING_ENABLED: 'false'
          SEO_FORBIDDEN_PUBLIC_TERMS: ${{ secrets.SEO_FORBIDDEN_PUBLIC_TERMS }}
        run: npm run seo:audit
      - run: npx tsc --noEmit
